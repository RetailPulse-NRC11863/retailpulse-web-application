<div class="heatmap-panel">
  <div class="heatmap-header">
    <h3 class="heatmap-title">Live Store Heatmap</h3>
    <div class="heatmap-legend">
      <div class="legend-item"><span class="color-box low"></span> Low</div>
      <div class="legend-item"><span class="color-box medium"></span> Med</div>
      <div class="legend-item"><span class="color-box high"></span> High</div>
    </div>
  </div>
  
  <div class="heatmap-grid">
    <div 
      *ngFor="let cell of grid" 
      class="heatmap-cell"
      [style.backgroundColor]="getColorForIntensity(cell.intensity)"
      [style.opacity]="cell.intensity > 0.2 ? cell.intensity + 0.2 : 0.4">
    </div>
  </div>
</div>
