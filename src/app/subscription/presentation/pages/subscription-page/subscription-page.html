<div class="subscription-container">
  <div class="page-header">
    <h1 class="page-title">Subscription Management</h1>
    <p class="page-subtitle">Manage your SaaS plan and billing</p>
  </div>

  <div class="loading-state" *ngIf="store.loading()">
    <div class="spinner"></div>
    <p>Loading plans...</p>
  </div>

  <div class="plans-grid" *ngIf="!store.loading()">
    <app-subscription-card 
      *ngFor="let plan of store.plans()" 
      [plan]="plan">
    </app-subscription-card>
  </div>
</div>
