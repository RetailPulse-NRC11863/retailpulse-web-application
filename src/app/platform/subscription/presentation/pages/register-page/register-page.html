<section class="page">
  <header class="header">
    <a routerLink="/" class="back">{{ 'register.back' | translate }}</a>
    <h1>{{ 'register.title' | translate }}</h1>
    <p class="subtitle">{{ 'register.subtitle' | translate }}</p>
  </header>

  <div class="content">
    <div class="card">
      <h2>{{ 'register.accountTitle' | translate }}</h2>

      <form [formGroup]="form" class="form">
        <label>
          <span>{{ 'register.storeName' | translate }}</span>
          <input type="text" formControlName="storeName" placeholder="RetailPulse Demo Store" />
        </label>
        <label>
          <span>{{ 'register.email' | translate }}</span>
          <input type="email" formControlName="email" placeholder="admin@store.com" autocomplete="email" />
        </label>
        <label>
          <span>{{ 'register.password' | translate }}</span>
          <input type="password" formControlName="password" placeholder="••••••••" autocomplete="new-password" />
        </label>

        <p class="hint">{{ 'register.hint' | translate }}</p>
      </form>
    </div>

    <div class="card">
      <div class="plans-head">
        <h2>{{ 'register.choosePlan' | translate }}</h2>
        <p>{{ 'register.choosePlanHint' | translate }}</p>
      </div>

      <div class="plans">
        <button class="plan" type="button" *ngFor="let plan of plans()" (click)="pickPlan(plan)">
          <div class="plan-top">
            <div>
              <div class="plan-name">{{ plan.name }}</div>
              <div class="plan-desc">{{ plan.getDescription(lang) }}</div>
            </div>
            <div class="plan-price">
              <span class="price">{{ plan.currency === 'USD' ? '$' : plan.currency }}{{ plan.price }}</span>
              <span class="per">/mo</span>
            </div>
          </div>
          <ul class="plan-features">
            <li *ngFor="let f of plan.getFeatures(lang).slice(0, 4)">{{ f }}</li>
          </ul>
          <div class="cta">{{ 'register.continueCheckout' | translate }}</div>
        </button>
      </div>
    </div>
  </div>

  @if (selectedPlan) {
    <app-stripe-checkout-modal
      [open]="checkoutOpen"
      [plan]="selectedPlan"
      [currentPlan]="null"
      mode="new"
      (closed)="closeCheckout()"
      (confirmed)="confirmCheckout()"
    />
  }
</section>
