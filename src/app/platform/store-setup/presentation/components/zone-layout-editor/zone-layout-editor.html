<div class="editor-wrapper">
  <div class="editor-toolbar">
    <div class="toolbar-info">
      <span class="drag-hint"><lucide-icon name="info" size="14"></lucide-icon> Drag zones to reposition them</span>
      <span class="snap-hint"><lucide-icon name="ruler" size="14"></lucide-icon> Snaps to 10px grid</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-save" (click)="onSave()" [disabled]="!hasMoved()">
        {{ hasMoved() ? 'Save Layout' : 'No Changes' }}
      </button>
    </div>
  </div>

  <div class="svg-editor-container">
    <svg
      #svgRef
      [attr.viewBox]="'0 0 ' + svgWidth + ' ' + svgHeight"
      class="editor-svg"
      xmlns="http://www.w3.org/2000/svg"
      (mouseleave)="onMouseUp()">

      <!-- Background -->
      <rect x="0" y="0" [attr.width]="svgWidth" [attr.height]="svgHeight"
            rx="8" fill="#f1f5f9" />

      <!-- Grid dots -->
      <defs>
        <pattern id="grid" [attr.width]="gridSnap" [attr.height]="gridSnap"
                 patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.6" />
        </pattern>
      </defs>
      <rect x="0" y="0" [attr.width]="svgWidth" [attr.height]="svgHeight"
            fill="url(#grid)" rx="8" />

      <!-- Zones -->
      <g *ngFor="let zone of zones$()">
        <!-- Shadow -->
        <rect
          [attr.x]="zone.x + 3"
          [attr.y]="zone.y + 3"
          [attr.width]="zone.width"
          [attr.height]="zone.height"
          [attr.rx]="8"
          fill="rgba(0,0,0,0.1)"
          pointer-events="none" />

        <!-- Zone body -->
        <rect
          [attr.x]="zone.x"
          [attr.y]="zone.y"
          [attr.width]="zone.width"
          [attr.height]="zone.height"
          [attr.rx]="8"
          [attr.fill]="getZoneColor(zone.type)"
          [attr.opacity]="zone.id === selectedId() ? 1 : 0.82"
          [attr.stroke]="zone.id === selectedId() ? '#0A2540' : 'rgba(255,255,255,0.5)'"
          [attr.stroke-width]="zone.id === selectedId() ? 2.5 : 1"
          style="cursor: grab; user-select: none;"
          (mousedown)="onMouseDown(zone, $event, $any(svgRef))" />

        <!-- Move cursor indicator overlay -->
        <rect
          [attr.x]="zone.x"
          [attr.y]="zone.y"
          [attr.width]="zone.width"
          [attr.height]="zone.height"
          [attr.rx]="8"
          fill="transparent"
          style="cursor: grab; user-select: none;"
          (mousedown)="onMouseDown(zone, $event, $any(svgRef))" />

        <!-- Icon -->
        <foreignObject [attr.x]="zone.x + zone.width / 2 - 12" [attr.y]="zone.y + zone.height / 2 - 32" width="24" height="24">
          <div xmlns="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
            <lucide-icon [img]="getZoneIcon(zone.type)" size="20" color="white"></lucide-icon>
          </div>
        </foreignObject>

        <!-- Zone name -->
        <text
          [attr.x]="zone.x + zone.width / 2"
          [attr.y]="zone.y + zone.height / 2 + 5"
          text-anchor="middle"
          font-size="14"
          font-weight="700"
          fill="white"
          pointer-events="none"
          style="text-shadow: 0 1px 3px rgba(0,0,0,0.3);">
          {{ zone.name }}
        </text>

        <!-- Position coords (shown when selected) -->
        <text *ngIf="zone.id === selectedId()"
              [attr.x]="zone.x + zone.width / 2"
              [attr.y]="zone.y + zone.height / 2 + 22"
              text-anchor="middle"
              font-size="11"
              fill="white"
              opacity="0.75"
              pointer-events="none">
          ({{ zone.x }}, {{ zone.y }})
        </text>

        <!-- Resize handle (shown when selected) -->
        <rect *ngIf="zone.id === selectedId()"
              [attr.x]="zone.x + zone.width - 6"
              [attr.y]="zone.y + zone.height - 6"
              width="12"
              height="12"
              fill="#ffffff"
              stroke="#0A2540"
              stroke-width="2"
              rx="2"
              style="cursor: nwse-resize;"
              (mousedown)="onResizeMouseDown(zone, $event, $any(svgRef))" />
      </g>
    </svg>
  </div>
</div>
