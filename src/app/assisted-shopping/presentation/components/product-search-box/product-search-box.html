<div class="search-container">
  <div class="input-wrapper">
    <lucide-icon [img]="Search" [size]="24" class="search-icon"></lucide-icon>
    <input 
      type="text" 
      [ngModel]="query" 
      (ngModelChange)="onModelChange($event)"
      (keyup.enter)="onSearch()"
      placeholder="Search products (e.g., Arroz)"
      class="search-input"
      autofocus
    />
    <button type="button" *ngIf="query" class="clear-button" (click)="onClear()">
      <lucide-icon [img]="X" [size]="20"></lucide-icon>
    </button>
  </div>
  <button type="button" class="search-button" (click)="onSearch()">Search</button>
</div>
